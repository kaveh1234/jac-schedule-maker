<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC Schedule Maker - Fall 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
/* ── Theme tokens ──────────────────────────────────────────────────────── */
:root {
  --bg:        oklch(98% 0.005 70);
  --surface:   oklch(99.5% 0.003 70);
  --surface-2: oklch(96.5% 0.006 70);
  --ink:       oklch(20% 0.015 250);
  --ink-2:     oklch(35% 0.015 250);
  --muted:     oklch(52% 0.015 250);
  --subtle:    oklch(72% 0.012 250);
  --hairline:  oklch(90% 0.008 70);
  --border:    oklch(85% 0.01 70);
  --accent:    oklch(45% 0.16 255);
  --accent-2:  oklch(60% 0.13 35);
  --shadow-sm: 0 1px 0 oklch(100% 0 0 / .8), 0 1px 2px oklch(20% 0.01 250 / .04);
  --shadow-md: 0 1px 0 oklch(100% 0 0 / .8), 0 6px 24px -8px oklch(20% 0.01 250 / .12);
  --shadow-lg: 0 1px 0 oklch(100% 0 0 / .8), 0 18px 50px -20px oklch(20% 0.01 250 / .25);
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
}

/* ── Reset & base ─────────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; }

.serif { font-family: 'Newsreader', 'Source Serif 4', Georgia, serif; font-feature-settings: "ss01"; }
.mono  { font-family: 'Geist Mono', ui-monospace, 'SF Mono', monospace; font-feature-settings: "ss01"; }

/* ── App shell ────────────────────────────────────────────────────────── */
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

/* ── Top bar ──────────────────────────────────────────────────────────── */
.topbar {
  padding: 18px 32px;
  border-bottom: 1px solid var(--hairline);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
}
.topbar::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--hairline) 20%, var(--hairline) 80%, transparent);
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: 'Newsreader', serif;
  font-size: 21px; font-weight: 500; font-style: italic;
  letter-spacing: -0.02em;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.brand-mark::after {
  content: ""; position: absolute; right: 5px; bottom: 5px;
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent-2);
}
.brand-text { display: flex; flex-direction: column; line-height: 1; gap: 4px; }
.brand-text .wordmark {
  font-family: 'Newsreader', serif; font-size: 22px; font-weight: 500;
  letter-spacing: -0.02em; color: var(--ink);
}
.brand-text .wordmark em { font-style: italic; font-weight: 400; color: var(--ink-2); }
.brand-text .meta {
  font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
  text-transform: uppercase; font-weight: 500;
}

.topbar-spacer { flex: 1; }

.topbar-stats { display: flex; gap: 0; align-items: stretch; }
.stat {
  padding: 4px 18px;
  display: flex; flex-direction: column; gap: 2px; line-height: 1.1;
  border-left: 1px solid var(--hairline);
}
.stat:first-child { border-left: 0; padding-left: 0; }
.stat .v {
  font-family: 'Newsreader', serif; font-size: 22px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.02em;
}
.stat .l {
  font-size: 10.5px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.08em; font-weight: 500;
}

/* ── Layout ───────────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 24px;
  padding: 24px 32px 40px;
  max-width: 1640px;
  margin: 0 auto;
  width: 100%;
  align-items: start;
}
@media (max-width: 1100px) {
  .layout { grid-template-columns: 320px 1fr; }
}

.panel {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
}
.panel + .panel { margin-top: 16px; }

.panel-head {
  padding: 16px 18px 12px;
  display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 1px solid var(--hairline);
}
.panel-head h2 {
  margin: 0;
  font-family: 'Newsreader', serif;
  font-size: 17px; font-weight: 500; letter-spacing: -0.01em;
  color: var(--ink);
}
.panel-head .pill {
  font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 500;
}

/* ── Sidebar ──────────────────────────────────────────────────────────── */
.sidebar { position: sticky; top: 16px; }

.search {
  position: relative; padding: 12px 14px;
  border-bottom: 1px solid var(--hairline);
}
.search input {
  width: 100%;
  appearance: none;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 8px 12px 8px 32px;
  font: inherit;
  color: var(--ink);
  outline: none;
  transition: border-color .12s, background .12s;
}
.search input:focus {
  background: var(--surface);
  border-color: var(--border);
  box-shadow: 0 0 0 3px oklch(45% 0.16 255 / .08);
}
.search input::placeholder { color: var(--subtle); }
.search .icon {
  position: absolute; left: 23px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--muted);
}

.course-list {
  max-height: 360px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.course-list::-webkit-scrollbar { width: 10px; }
.course-list::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 5px;
  border: 3px solid var(--surface); background-clip: padding-box;
}

.course-row {
  display: grid;
  grid-template-columns: 4px 1fr auto;
  align-items: stretch;
  gap: 12px;
  padding: 10px 14px 10px 0;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  transition: background .1s;
}
.course-row:last-child { border-bottom: 0; }
.course-row:hover { background: var(--surface-2); }
.course-row[data-selected="1"] { background: var(--surface-2); }
.course-row .stripe {
  background: var(--c, var(--border));
  border-radius: 0 2px 2px 0;
}
.course-row .body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.course-row .code {
  font-family: 'Geist Mono', monospace; font-size: 11.5px; font-weight: 500;
  color: var(--ink); letter-spacing: 0.01em;
}
.course-row .name {
  font-size: 13px; color: var(--ink-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.course-row .meta {
  font-size: 11px; color: var(--muted); padding-top: 2px;
  font-variant-numeric: tabular-nums;
}
.course-row .badge {
  align-self: center; padding: 3px 7px;
  background: var(--surface-2); border: 1px solid var(--hairline);
  border-radius: 999px; font-size: 10.5px; color: var(--muted);
  font-variant-numeric: tabular-nums; font-weight: 500;
}
.course-row[data-selected="1"] .badge {
  background: var(--c, var(--accent)); border-color: var(--c, var(--accent));
  color: white;
}

/* ── Selected chips ───────────────────────────────────────────────────── */
.chip-area { padding: 14px 16px 16px; }
.chip-area-h {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); font-weight: 500; margin-bottom: 10px;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 4px 4px 10px;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace; font-size: 11.5px; font-weight: 500;
  color: var(--ink-2);
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c, var(--accent)); }
.chip button {
  appearance: none; border: 0; background: transparent; color: var(--muted);
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer; line-height: 1;
  display: grid; place-items: center; font-size: 14px; padding: 0;
}
.chip button:hover { background: oklch(70% 0 0 / .15); color: var(--ink); }

.chips-empty {
  font-size: 12px; color: var(--subtle); font-style: italic;
}

/* ── Teacher prefs ────────────────────────────────────────────────────── */
.pref-list { display: flex; flex-direction: column; gap: 14px; padding: 14px 16px 16px; }
.pref-row {
  display: flex; flex-direction: column; gap: 8px;
}
.pref-row .pref-head {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
.pref-row .pref-code {
  font-family: 'Geist Mono', monospace; font-size: 11.5px; font-weight: 500;
  color: var(--ink-2); display: flex; align-items: center; gap: 6px;
}
.pref-row .pref-code .dot { width: 6px; height: 6px; border-radius: 50%; }
.pref-row .pref-hint {
  font-size: 10.5px; color: var(--muted);
  letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.pref-row .pref-clear {
  appearance: none; background: transparent; border: 0; color: var(--muted);
  font: inherit; font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase;
  cursor: pointer; padding: 0; text-decoration: underline;
  text-underline-offset: 2px; text-decoration-color: var(--border);
}
.pref-row .pref-clear:hover { color: var(--ink); }
.teacher-chips {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.teacher-chip {
  appearance: none; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 9px 5px 7px;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-radius: 7px;
  font: inherit;
  font-size: 11.5px;
  color: var(--ink-2);
  line-height: 1.2;
  transition: background .1s, border-color .1s, color .1s;
}
.teacher-chip:hover { background: var(--surface); border-color: var(--border); }
.teacher-chip .check {
  width: 14px; height: 14px; border-radius: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  color: transparent;
  transition: background .1s, border-color .1s, color .1s;
  flex-shrink: 0;
}
.teacher-chip[data-on="1"] {
  background: color-mix(in oklab, var(--c) 8%, var(--surface));
  border-color: color-mix(in oklab, var(--c) 35%, var(--border));
  color: var(--c);
}
.teacher-chip[data-on="1"] .check {
  background: var(--c); border-color: var(--c); color: white;
}

/* ── Main area ────────────────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

.schedule-head {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--hairline);
}
.schedule-head .left { display: flex; align-items: baseline; gap: 16px; }
.schedule-head h2 {
  margin: 0; font-family: 'Newsreader', serif;
  font-size: 20px; font-weight: 500; letter-spacing: -0.015em; color: var(--ink);
}
.schedule-head .result-count {
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.schedule-head .result-count strong { color: var(--ink); font-weight: 500; }

.nav-cluster {
  display: flex; align-items: center; gap: 8px;
  font-variant-numeric: tabular-nums;
}
.nav-cluster .index-pill {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  padding: 6px 12px;
  background: var(--surface-2);
  border-radius: 7px;
  color: var(--ink-2);
  min-width: 80px;
  text-align: center;
}
.nav-cluster button {
  appearance: none; border: 1px solid var(--hairline); background: var(--surface);
  border-radius: 7px; width: 32px; height: 32px;
  display: grid; place-items: center; cursor: pointer;
  color: var(--ink-2);
  transition: background .1s, border-color .1s, color .1s;
}
.nav-cluster button:hover:not(:disabled) {
  background: var(--surface-2); border-color: var(--border); color: var(--ink);
}
.nav-cluster button:disabled { opacity: .35; cursor: not-allowed; }
.nav-cluster .dots {
  display: flex; gap: 5px; padding: 0 4px;
}
.nav-cluster .dots i {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border);
  transition: background .12s, transform .12s;
  cursor: pointer;
}
.nav-cluster .dots i[data-active="1"] { background: var(--ink); transform: scale(1.3); }
.nav-cluster .dots i:hover { background: var(--ink-2); }

/* ── Grid ─────────────────────────────────────────────────────────────── */
.grid-wrap { padding: 0 20px 20px; }

.grid {
  display: grid;
  grid-template-columns: 64px repeat(var(--day-count, 5), 1fr);
  grid-template-rows: 36px repeat(var(--rows, 19), var(--slot-h, 36px));
  border: 1px solid var(--hairline);
  border-radius: 10px;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

.grid .corner {
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  background: var(--surface-2);
}
.grid .day-h {
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; font-weight: 500;
  color: var(--muted);
}
.grid .day-h:last-child { border-right: 0; }

.grid .time-cell {
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  background: var(--surface-2);
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding: 4px 8px 0 0;
  font-variant-numeric: tabular-nums;
}
.grid .day-cell {
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  position: relative;
}
.grid .day-cell:last-child { border-right: 0; }
.grid .day-cell.half-hour { border-bottom: 1px dashed oklch(94% 0.005 70); }

/* ── Course blocks ────────────────────────────────────────────────────── */
.block {
  position: relative;
  border-radius: 7px;
  padding: 8px 10px;
  font-size: 12px;
  display: flex; flex-direction: column;
  gap: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .12s cubic-bezier(.3,.7,.4,1), box-shadow .12s;
  z-index: 2;
  min-width: 0;
  background: var(--c-tint);
  color: var(--c);
  border-left: 3px solid var(--c);
}
.block:hover { transform: translateY(-1px); z-index: 3; box-shadow: 0 4px 14px -6px var(--c); }

.block .b-time {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px; font-weight: 500;
  letter-spacing: -0.01em;
  opacity: .85;
  display: flex; justify-content: space-between; align-items: center;
}
.block .b-time .type-tag {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 1px 5px; border-radius: 3px; font-weight: 600;
  background: var(--c); color: white; opacity: 1;
}
.block .b-code {
  font-family: 'Geist Mono', monospace;
  font-size: 12px; font-weight: 600;
  letter-spacing: -0.005em;
  margin-top: 1px;
}
.block .b-name {
  font-size: 11px; line-height: 1.25;
  color: var(--ink-2);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.block .b-meta {
  font-size: 10.5px; color: var(--muted); margin-top: auto;
  display: flex; gap: 8px; align-items: baseline;
  font-variant-numeric: tabular-nums;
}
.block .b-meta .teacher {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}

.block.compact { padding: 4px 8px; gap: 0; }
.block.compact .b-name { display: none; }
.block.compact .b-meta { margin-top: 1px; }

/* ── Section details ──────────────────────────────────────────────────── */
.details-head { padding: 14px 20px 0; }
.details-head h3 {
  margin: 0; font-family: 'Newsreader', serif;
  font-size: 16px; font-weight: 500; letter-spacing: -0.01em; color: var(--ink);
}
.details-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--hairline);
  border-top: 1px solid var(--hairline);
  margin-top: 14px;
  border-radius: 0 0 var(--r-lg) var(--r-lg);
  overflow: hidden;
}
.detail-card {
  padding: 14px 18px;
  background: var(--surface);
  display: flex; flex-direction: column; gap: 6px;
  border-left: 3px solid var(--c, var(--border));
}
.detail-card .row-1 {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
.detail-card .code {
  font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600;
  color: var(--ink);
}
.detail-card .name {
  font-size: 13px; color: var(--ink-2);
}
.detail-card .teach {
  font-size: 11.5px; color: var(--muted); margin-top: 2px;
}
.detail-card .meetings {
  display: flex; flex-direction: column; gap: 2px; margin-top: 6px;
  padding-top: 8px; border-top: 1px dashed var(--hairline);
}
.detail-card .meet-line {
  font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--ink-2);
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 8px; align-items: baseline;
  font-variant-numeric: tabular-nums;
}
.detail-card .meet-line .day { color: var(--muted); }

/* Empty state */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px;
  color: var(--muted);
  text-align: center;
}
.empty .empty-mark {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  display: grid; place-items: center;
  margin-bottom: 16px;
  color: var(--subtle);
}
.empty h3 {
  margin: 0 0 6px;
  font-family: 'Newsreader', serif;
  font-size: 18px; font-weight: 500; color: var(--ink-2);
  font-style: italic;
}
.empty p { margin: 0; font-size: 13px; max-width: 320px; }
    </style>
</head>

    <script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

// Subject colors with OKLCH
const SUBJECTS = {

  CHEM: { name: 'Chemistry', color: 'oklch(58% 0.14 40)', tint: 'oklch(96% 0.03 40)' },
  PHYS: { name: 'Physics', color: 'oklch(48% 0.17 300)', tint: 'oklch(96% 0.03 300)' },
  MATH: { name: 'Mathematics', color: 'oklch(45% 0.16 255)', tint: 'oklch(96% 0.025 255)' },
  ENGL: { name: 'English', color: 'oklch(58% 0.12 80)', tint: 'oklch(96% 0.04 85)' },
  FREN: { name: 'French', color: 'oklch(55% 0.14 30)', tint: 'oklch(96% 0.03 30)' },
  HUMA: { name: 'Humanities', color: 'oklch(48% 0.14 340)', tint: 'oklch(96% 0.03 340)' },
  PHIL: { name: 'Philosophy', color: 'oklch(42% 0.06 240)', tint: 'oklch(96% 0.015 240)' },
  PHED: { name: 'Phys. Ed.', color: 'oklch(52% 0.12 195)', tint: 'oklch(96% 0.025 195)' },
  COMP: { name: 'Computer Science', color: 'oklch(50% 0.14 220)', tint: 'oklch(96% 0.025 220)' },
  PSYC: { name: 'Psychology', color: 'oklch(55% 0.15 10)', tint: 'oklch(96% 0.03 10)' },
  HIST: { name: 'History', color: 'oklch(48% 0.11 25)', tint: 'oklch(96% 0.025 25)' },
  ECON: { name: 'Economics', color: 'oklch(50% 0.12 175)', tint: 'oklch(96% 0.025 175)' },
  GEOG: { name: 'Geography', color: 'oklch(50% 0.1 120)', tint: 'oklch(96% 0.02 120)' },
  SOCI: { name: 'Sociology', color: 'oklch(52% 0.13 280)', tint: 'oklch(96% 0.025 280)' },
  POLI: { name: 'Political Science', color: 'oklch(48% 0.12 60)', tint: 'oklch(96% 0.025 60)' },
};

const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
const DAY_MAP = { 'Monday': 0, 'Tuesday': 1, 'Wednesday': 2, 'Thursday': 3, 'Friday': 4 };
const DAY_START = 8 * 60;
const DAY_END = 18 * 60;
const SLOT_MIN = 30;
const SLOTS = (DAY_END - DAY_START) / SLOT_MIN;

let COURSES = [];
let ALL_TEACHERS = [];

// Icons
const IconSearch = () => (
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" className="icon">
    <circle cx="7" cy="7" r="5" />
    <path d="M11 11l3 3" strokeLinecap="round" />
  </svg>
);
const IconChevron = ({ dir = 'right' }) => (
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor"
       strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"
       style={{ transform: dir === 'left' ? 'scaleX(-1)' : 'none' }}>
    <path d="M6 4l4 4-4 4" />
  </svg>
);
const IconCal = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3.5" y="5" width="17" height="15" rx="2" />
    <path d="M3.5 10h17M8 3v4M16 3v4" />
  </svg>
);

function fmtTime(min) {
  const h = Math.floor(min / 60), m = min % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = ((h + 11) % 12) + 1;
  return m === 0 ? `${h12} ${ampm}` : `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

function fmtRange(s, e) {
  return `${fmtTime(s)} - ${fmtTime(e)}`;
}

function timeStrToMin(timeStr) {
  const h = parseInt(timeStr.substring(0, 2));
  const m = parseInt(timeStr.substring(2, 4));
  return h * 60 + m;
}

function getSubject(discipline) {
  return SUBJECTS[discipline] || { name: discipline, color: 'oklch(50% 0.1 200)', tint: 'oklch(96% 0.02 200)' };
}

// Transform loaded JSON data to app format
function transformData(data) {
  const courses = [];
  const teacherSet = new Set();

  for (const course of data.courses) {
    const sections = [];
    for (const section of course.sections) {
      const meetings = [];
      const teachers = new Set();

      for (const comp of section.components) {
        teachers.add(comp.teacher);
        teacherSet.add(comp.teacher);

        for (const dayName of comp.days) {
          const day = DAY_MAP[dayName];
          if (day !== undefined && comp.time) {
            meetings.push({
              day,
              start: timeStrToMin(comp.time.start),
              end: timeStrToMin(comp.time.end),
              type: comp.type,
            });
          }
        }
      }

      sections.push({
        id: section.section,
        teacher: Array.from(teachers).join(', '),
        teachers: Array.from(teachers),
        meetings,
      });
    }

    if (sections.length > 0) {
      courses.push({
        code: `${course.discipline} ${course.course_code}`,
        subject: course.discipline,
        name: course.course_title,
        sections,
      });
    }
  }

  return { courses, teachers: Array.from(teacherSet).sort() };
}

// Schedule generator
function generateSchedules(selectedCodes, teacherPrefs, courses) {
  const selectedCourses = selectedCodes.map(c => courses.find(x => x.code === c)).filter(Boolean);
  const results = [];

  const overlap = (a, b) => a.day === b.day && a.start < b.end && b.start < a.end;

  const conflicts = (picked, sec) => {
    for (const p of picked) {
      for (const m1 of p.section.meetings) {
        for (const m2 of sec.meetings) {
          if (overlap(m1, m2)) return true;
        }
      }
    }
    return false;
  };

  const walk = (i, picked) => {
    if (results.length >= 100) return;
    if (i === selectedCourses.length) {
      results.push({ sections: picked.map(p => ({ ...p })) });
      return;
    }

    const course = selectedCourses[i];
    const prefList = teacherPrefs[course.code] || [];

    // Filter sections by preferred teachers (if any selected)
    let sections = course.sections;
    if (prefList.length > 0) {
      sections = course.sections.filter(s =>
        s.teachers.some(t => prefList.includes(t))
      );
      if (sections.length === 0) sections = course.sections;
    }

    for (const sec of sections) {
      if (conflicts(picked, sec)) continue;
      picked.push({ course, section: sec });
      walk(i + 1, picked);
      picked.pop();
    }
  };

  walk(0, []);
  return results;
}

// Components
function Brand() {
  return (
    <div className="brand">
      <div className="brand-mark">J</div>
      <div className="brand-text">
        <div className="wordmark">Schedule <em>Maker</em></div>
        <div className="meta">John Abbott College · Fall 2026</div>
      </div>
    </div>
  );
}

function TopStats({ courses, teachers, results }) {
  return (
    <div className="topbar-stats">
      <div className="stat"><div className="v">{courses}</div><div className="l">Courses</div></div>
      <div className="stat"><div className="v">{teachers}</div><div className="l">Teachers</div></div>
      <div className="stat"><div className="v">{results}</div><div className="l">Valid Schedules</div></div>
    </div>
  );
}

function CourseRow({ course, selected, onToggle }) {
  const sub = getSubject(course.subject);
  return (
    <div className="course-row" data-selected={selected ? '1' : '0'}
         style={{ '--c': sub.color }} onClick={() => onToggle(course.code)}>
      <div className="stripe" />
      <div className="body">
        <div className="code">{course.code}</div>
        <div className="name">{course.name}</div>
        <div className="meta">{sub.name} · {course.sections.length} sections</div>
      </div>
      <div className="badge">{course.sections.length}</div>
    </div>
  );
}

function SidebarCourses({ query, setQuery, selected, onToggle, courses }) {
  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return courses;
    return courses.filter(c =>
      c.code.toLowerCase().includes(q) ||
      c.name.toLowerCase().includes(q) ||
      getSubject(c.subject).name.toLowerCase().includes(q)
    );
  }, [query, courses]);

  return (
    <div className="panel">
      <div className="panel-head">
        <h2>Select courses</h2>
        <span className="pill">{filtered.length} shown</span>
      </div>
      <div className="search">
        <IconSearch />
        <input
          placeholder="Search by code, name, or subject..."
          value={query}
          onChange={(e) => setQuery(e.target.value)}
        />
      </div>
      <div className="course-list">
        {filtered.map(c => (
          <CourseRow key={c.code} course={c}
                     selected={selected.includes(c.code)} onToggle={onToggle} />
        ))}
      </div>
    </div>
  );
}

function SelectedChips({ selected, onRemove, courses }) {
  return (
    <div className="chip-area">
      <div className="chip-area-h">Selected - {selected.length}</div>
      {selected.length === 0 ? (
        <div className="chips-empty">Pick courses above to start.</div>
      ) : (
        <div className="chips">
          {selected.map(code => {
            const course = courses.find(c => c.code === code);
            if (!course) return null;
            const sub = getSubject(course.subject);
            return (
              <span key={code} className="chip" style={{ '--c': sub.color }}>
                <span className="dot" />
                {code}
                <button onClick={() => onRemove(code)}>×</button>
              </span>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TeacherPrefs({ selected, prefs, toggleTeacher, clearPrefs, courses }) {
  if (selected.length === 0) return null;

  return (
    <div className="panel">
      <div className="panel-head">
        <h2>Teacher preferences</h2>
        <span className="pill">Optional · multi-select</span>
      </div>
      <div className="pref-list">
        {selected.map(code => {
          const course = courses.find(c => c.code === code);
          if (!course) return null;
          const sub = getSubject(course.subject);

          // Get all unique teachers for this course
          const teacherSet = new Set();
          course.sections.forEach(s => s.teachers.forEach(t => teacherSet.add(t)));
          const teachers = Array.from(teacherSet).sort();

          const picked = prefs[code] || [];
          const hint = picked.length === 0
            ? `Any of ${teachers.length}`
            : `${picked.length} of ${teachers.length} preferred`;

          return (
            <div className="pref-row" key={code}>
              <div className="pref-head">
                <div className="pref-code">
                  <span className="dot" style={{ background: sub.color }} />
                  {code}
                </div>
                <div className="pref-hint">
                  {hint}
                  {picked.length > 0 && (
                    <button className="pref-clear" onClick={() => clearPrefs(code)}>
                      clear
                    </button>
                  )}
                </div>
              </div>
              <div className="teacher-chips">
                {teachers.map(tch => {
                  const on = picked.includes(tch);
                  return (
                    <button key={tch} type="button"
                            className="teacher-chip" data-on={on ? '1' : '0'}
                            style={{ '--c': sub.color }}
                            onClick={() => toggleTeacher(code, tch)}>
                      <span className="check">
                        <svg viewBox="0 0 12 12" width="10" height="10">
                          <path d="M2.5 6.2 5 8.6 9.5 3.6" fill="none"
                                stroke="currentColor" strokeWidth="1.8"
                                strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      </span>
                      {tch}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScheduleGrid({ days, blocks, slotH }) {
  const cells = [];

  cells.push(
    <div className="corner" key="corner" style={{ gridRow: 1, gridColumn: 1 }} />
  );

  days.forEach((d, di) => {
    cells.push(
      <div className="day-h" key={`h-${d}`}
           style={{ gridRow: 1, gridColumn: di + 2 }}>{DAY_NAMES[d]}</div>
    );
  });

  for (let i = 0; i < SLOTS; i++) {
    const min = DAY_START + i * SLOT_MIN;
    const isHour = min % 60 === 0;
    cells.push(
      <div className="time-cell" key={`t-${i}`}
           style={{ gridRow: i + 2, gridColumn: 1 }}>
        {isHour ? fmtTime(min) : ''}
      </div>
    );
    days.forEach((d, di) => {
      cells.push(
        <div className={`day-cell${isHour ? '' : ' half-hour'}`}
             key={`c-${i}-${d}`}
             style={{ gridRow: i + 2, gridColumn: di + 2 }} />
      );
    });
  }

  return (
    <div className="grid"
         style={{
           '--rows': SLOTS,
           '--slot-h': slotH + 'px',
           '--day-count': days.length,
         }}>
      {cells}
      {blocks.map((b, i) => {
        const dayCol = days.indexOf(b.day);
        if (dayCol < 0) return null;
        const startSlot = (b.start - DAY_START) / SLOT_MIN;
        const slotSpan = (b.end - b.start) / SLOT_MIN;
        const sub = getSubject(b.course.subject);
        const dur = b.end - b.start;
        const compact = dur <= 30;

        return (
          <div
            key={i}
            className={`block${compact ? ' compact' : ''}`}
            style={{
              gridColumn: dayCol + 2,
              gridRow: `${startSlot + 2} / span ${slotSpan}`,
              '--c': sub.color,
              '--c-tint': sub.tint,
              margin: '2px',
            }}
            title={`${b.course.code} · ${b.section.teacher}`}
          >
            <div className="b-time">
              <span>{fmtRange(b.start, b.end)}</span>
              <span className="type-tag">{b.type[0]}</span>
            </div>
            <div className="b-code">{b.course.code}</div>
            <div className="b-name">{b.course.name}</div>
            <div className="b-meta">
              <span className="teacher">{b.section.teacher}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SectionDetails({ schedule }) {
  return (
    <div className="panel">
      <div className="details-head">
        <h3>Section details</h3>
      </div>
      <div className="details-list">
        {schedule.sections.map(({ course, section }) => {
          const sub = getSubject(course.subject);
          return (
            <div className="detail-card" key={course.code} style={{ '--c': sub.color }}>
              <div className="row-1">
                <span className="code">{course.code}</span>
              </div>
              <div className="name">{course.name}</div>
              <div className="teach">Section {section.id} · {section.teacher}</div>
              <div className="meetings">
                {section.meetings.map((m, i) => (
                  <div className="meet-line" key={i}>
                    <span className="day">{DAY_NAMES[m.day]}</span>
                    <span>{fmtRange(m.start, m.end)} · {m.type}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [courses, setCourses] = useState([]);
  const [allTeachers, setAllTeachers] = useState([]);
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState([]);
  const [prefs, setPrefs] = useState({});
  const [scheduleIdx, setScheduleIdx] = useState(0);

  useEffect(() => {
    fetch('schedule_data.json')
      .then(r => r.json())
      .then(data => {
        const { courses, teachers } = transformData(data);
        setCourses(courses);
        setAllTeachers(teachers);
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to load data:', err);
        setLoading(false);
      });
  }, []);

  const toggleCourse = useCallback(code => {
    setSelected(s => s.includes(code) ? s.filter(x => x !== code) : [...s, code]);
    setScheduleIdx(0);
  }, []);

  const removeCourse = useCallback(code => {
    setSelected(s => s.filter(x => x !== code));
    setPrefs(p => { const { [code]: _, ...rest } = p; return rest; });
    setScheduleIdx(0);
  }, []);

  const toggleTeacher = useCallback((code, teacher) => {
    setPrefs(p => {
      const cur = p[code] || [];
      const next = cur.includes(teacher)
        ? cur.filter(x => x !== teacher)
        : [...cur, teacher];
      return { ...p, [code]: next };
    });
    setScheduleIdx(0);
  }, []);

  const clearPrefs = useCallback(code => {
    setPrefs(p => ({ ...p, [code]: [] }));
    setScheduleIdx(0);
  }, []);

  const schedules = useMemo(
    () => generateSchedules(selected, prefs, courses),
    [selected, prefs, courses]
  );
  const current = schedules[scheduleIdx];
  const days = [0, 1, 2, 3, 4];
  const slotH = 36;

  const blocks = useMemo(() => {
    if (!current) return [];
    const out = [];
    for (const { course, section } of current.sections) {
      for (const m of section.meetings) {
        out.push({ ...m, course, section });
      }
    }
    return out;
  }, [current]);

  useEffect(() => {
    if (scheduleIdx >= schedules.length) {
      setScheduleIdx(Math.max(0, schedules.length - 1));
    }
  }, [schedules.length, scheduleIdx]);

  useEffect(() => {
    const h = e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft' && scheduleIdx > 0) setScheduleIdx(scheduleIdx - 1);
      if (e.key === 'ArrowRight' && scheduleIdx < schedules.length - 1) setScheduleIdx(scheduleIdx + 1);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [scheduleIdx, schedules.length]);

  if (loading) {
    return (
      <div className="app">
        <header className="topbar">
          <Brand />
        </header>
        <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)' }}>
          Loading schedule data...
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <header className="topbar">
        <Brand />
        <div className="topbar-spacer" />
        <TopStats
          courses={courses.length}
          teachers={allTeachers.length}
          results={schedules.length}
        />
      </header>

      <div className="layout">
        <aside className="sidebar">
          <SidebarCourses
            query={query} setQuery={setQuery}
            selected={selected} onToggle={toggleCourse}
            courses={courses}
          />

          <div className="panel">
            <SelectedChips selected={selected} onRemove={removeCourse} courses={courses} />
          </div>

          <TeacherPrefs
            selected={selected}
            prefs={prefs}
            toggleTeacher={toggleTeacher}
            clearPrefs={clearPrefs}
            courses={courses}
          />
        </aside>

        <main className="main">
          <div className="panel">
            <div className="schedule-head">
              <div className="left">
                <h2>Your schedule</h2>
                <div className="result-count">
                  {schedules.length === 0
                    ? <span>No valid schedules - try removing a course or teacher pin.</span>
                    : <span><strong>{schedules.length}</strong> valid arrangement{schedules.length === 1 ? '' : 's'}</span>}
                </div>
              </div>
              {schedules.length > 0 && (
                <div className="nav-cluster">
                  <button onClick={() => setScheduleIdx(Math.max(0, scheduleIdx - 1))}
                          disabled={scheduleIdx === 0}>
                    <IconChevron dir="left" />
                  </button>
                  <div className="index-pill">
                    {scheduleIdx + 1} / {schedules.length}
                  </div>
                  <button onClick={() => setScheduleIdx(Math.min(schedules.length - 1, scheduleIdx + 1))}
                          disabled={scheduleIdx >= schedules.length - 1}>
                    <IconChevron />
                  </button>
                  {schedules.length <= 12 && (
                    <div className="dots">
                      {schedules.map((_, i) => (
                        <i key={i} data-active={i === scheduleIdx ? '1' : '0'}
                           onClick={() => setScheduleIdx(i)} />
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="grid-wrap">
              {schedules.length === 0 ? (
                <div className="empty">
                  <div className="empty-mark"><IconCal /></div>
                  <h3>Nothing fits - yet.</h3>
                  <p>{selected.length === 0
                    ? 'Choose a few courses from the left to generate a schedule.'
                    : 'Your current selection and teacher pins conflict. Try loosening a constraint.'}</p>
                </div>
              ) : (
                <ScheduleGrid days={days} blocks={blocks} slotH={slotH} />
              )}
            </div>
          </div>

          {current && <SectionDetails schedule={current} />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
